<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Checkers</title>
<!-- hide the BYO-model panel on the public site (AI only works when run locally) -->
<script>try{var h=location.hostname;if(!(location.protocol==='file:'||/^(localhost|127\.0\.0\.1|0\.0\.0\.0|::1|\[::1\])$/i.test(h)||/\.local$/i.test(h)))document.documentElement.className+=' hosted';}catch(e){}</script>
<style>
  html.hosted .ai-only { display: none !important; }
  /* ---- house style · signature hue: red ---- */
  :root {
    --bg: #0c0d0f;
    --bg-2: #131417;
    --panel: #131417;
    --panel-2: #1a1c20;
    --grid: #24262b;
    --line: #313338;
    --sq-light: #2f3138;        /* non-playable square */
    --sq-dark: #1a1c20;         /* playable square (pieces live here) */
    --text: #e7e6e0;
    --muted: #8a8d93;
    --accent: #cf5a52;          /* muted red */
    --on-accent: #0c0d0f;
    --red: #cf5a52;             /* player 1 discs */
    --red-2: #8e3a35;
    --cream: #cfd1d8;           /* player 2 discs */
    --cream-2: #8a8d93;
    --gold: #c7a24a;            /* king crown */
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
    --sq: clamp(34px, 8.6vw, 64px);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0; background: var(--bg); color: var(--text); font-family: var(--mono);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 30px 16px 60px;
  }

  h1 {
    text-align: center; margin: 0 0 6px; font-weight: 700;
    letter-spacing: 4px; text-transform: uppercase; font-size: clamp(28px, 6vw, 50px);
    color: var(--text);
  }
  .subtitle { text-align: center; color: var(--muted); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 22px; }

  .game { display: flex; gap: 26px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }

  /* ---- board ---- */
  .board-wrap { position: relative; }
  .board {
    display: grid; grid-template-columns: repeat(8, var(--sq)); grid-template-rows: repeat(8, var(--sq));
    border: 1px solid var(--grid); user-select: none;
  }
  .sq { position: relative; width: var(--sq); height: var(--sq); display: flex; align-items: center; justify-content: center; }
  .sq.light { background: var(--sq-light); }
  .sq.dark { background: var(--sq-dark); cursor: pointer; }
  .sq.sel { box-shadow: inset 0 0 0 3px var(--accent); }
  .sq.lastmove { box-shadow: inset 0 0 0 1000px rgba(207,90,82,0.12); }

  .coord { position: absolute; font-size: 9px; font-weight: 700; color: var(--muted); pointer-events: none; opacity: .7; }
  .coord.file { right: 3px; bottom: 2px; }
  .coord.rank { left: 3px; top: 2px; }

  .disc {
    width: 74%; height: 74%; border-radius: 50%; position: relative; pointer-events: none;
    display: flex; align-items: center; justify-content: center;
  }
  .disc.red { background: var(--red); border: 1px solid var(--red-2);
              box-shadow: inset 0 -2px 4px rgba(0,0,0,.35); }
  .disc.white { background: var(--cream); border: 1px solid var(--cream-2);
                box-shadow: inset 0 -2px 4px rgba(0,0,0,.3); }
  .disc .crown { color: var(--gold); font-size: calc(var(--sq) * 0.38); line-height: 1; }

  /* legal-move markers */
  .dot { position: absolute; width: 26%; height: 26%; border-radius: 50%; background: rgba(207,90,82,0.55); z-index: 1; }
  .ring { position: absolute; inset: 12%; border-radius: 50%; border: 4px solid rgba(207,90,82,0.7); z-index: 1; }

  /* ---- side panel ---- */
  .panel {
    background: var(--panel); border: 1px solid var(--grid);
    padding: 18px; width: 250px;
  }
  .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 16px; }
  .field > label { font-size: 10px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .seg { display: flex; gap: 6px; flex-wrap: wrap; }
  .seg-btn {
    padding: 8px 12px; border: 1px solid var(--grid); background: var(--bg-2); color: var(--muted);
    font-family: var(--mono); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; font-size: 11px;
    transition: color .12s, border-color .12s, background .12s;
  }
  .seg-btn:hover { color: var(--text); border-color: var(--muted); }
  .seg-btn.active { border-color: var(--accent); color: var(--accent); background: var(--panel-2); }

  .turn { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
  .turn .swatch { width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--grid); }
  .turn .swatch.red { background: var(--red); }
  .turn .swatch.white { background: var(--cream); }

  .status { min-height: 22px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 14px; line-height: 1.5; }
  .status.over { color: var(--gold); }

  .tally { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .tally b { color: var(--text); }

  .buttons { display: flex; gap: 8px; }
  button.act {
    flex: 1; background: var(--panel); color: var(--text); border: 1px solid var(--grid); border-radius: 0;
    padding: 10px; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; font-family: var(--mono);
    cursor: pointer; transition: background .15s, border-color .15s, color .15s, transform .08s;
  }
  button.act:hover { border-color: var(--accent); color: var(--accent); }
  button.act:active { transform: translateY(1px); }
  button.act.secondary { color: var(--muted); border-color: var(--grid); }
  button.act.secondary:hover { border-color: var(--accent); color: var(--accent); }
  button.act:disabled { opacity: .4; cursor: default; }
  button.act:disabled:hover { background: var(--panel); color: var(--muted); border-color: var(--grid); }

  /* ---- AI panel (local only) ---- */
  #ckAi { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--grid); display: flex; flex-direction: column; gap: 9px; font-size: 12px; }
  #ckAi .ai-row { display: flex; align-items: center; gap: 8px; }
  #ckAi .ai-label { width: 58px; flex: none; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  #ckAi label.chk { display: flex; align-items: center; gap: 8px; color: var(--muted); cursor: pointer; font-size: 11px; }
  #ckAi label.chk input { accent-color: var(--accent); }
  #ckAi select, #ckAi input[type=text] { flex: 1; min-width: 0; background: var(--bg-2); color: var(--text); border: 1px solid var(--grid); padding: 5px 7px; font-size: 12px; font-family: var(--mono); }
  #ckAi .ai-refresh { flex: none; background: var(--bg-2); color: var(--accent); border: 1px solid var(--grid); padding: 5px 9px; cursor: pointer; font-family: var(--mono); }
  #ckAi .ai-refresh:hover { background: var(--accent); color: var(--on-accent); }
  #ckAi .ai-statusline { display: flex; align-items: center; gap: 7px; color: var(--muted); }
  #ckAi .ai-dot { width: 9px; height: 9px; background: #555; flex: none; }
  #ckAi .ai-dot.on { background: var(--accent); }
  #ckAi .ai-dot.err { background: #cf5a52; }
  #ckAi .ai-think { display: none; max-height: 110px; overflow: auto; background: var(--bg-2); border: 1px solid var(--grid); padding: 8px; color: var(--text); white-space: pre-wrap; font-size: 11px; line-height: 1.45; }
  #ckAi .ai-think.show { display: block; }
  #ckAi .ai-hint { font-size: 11px; color: var(--muted); line-height: 1.5; }
  #ckAi .ai-hint a { color: var(--accent); }
  #ckAi.hide-side { display: none; }   /* whole AI panel is irrelevant in 2-player mode */

  @media (max-width: 760px) { .panel { width: min(92vw, 420px); } }
</style>

<body>
  <h1>Checkers</h1>
  <div class="subtitle">Forced jumps · crown your kings</div>

  <div class="game">
    <div class="board-wrap"><div class="board" id="board"></div></div>

    <div class="panel">
      <div class="field">
        <label>Opponent</label>
        <div class="seg" id="modeSeg">
          <button class="seg-btn active" data-mode="pvp">2 Players</button>
          <button class="seg-btn" data-mode="ai">vs Computer</button>
        </div>
      </div>
      <div class="field">
        <label>Jumps</label>
        <div class="seg" id="forcedSeg">
          <button class="seg-btn active" data-f="1">Forced</button>
          <button class="seg-btn" data-f="0">Optional</button>
        </div>
      </div>
      <div class="field ck-side-only" id="sideField" style="display:none">
        <label>Difficulty</label>
        <div class="seg" id="diffSeg">
          <button class="seg-btn" data-d="2">Easy</button>

          <button class="seg-btn" data-d="6">Hard</button>

      </div>
      <div class="field ck-side-only" id="aiSideField" style="display:none">
        <label>Computer plays</label>
        <div class="seg" id="aiColorSeg">
          <button class="seg-btn active" data-c="w">White</button>
          <button class="seg-btn" data-c="r">Red</button>

      <div class="turn">
        <span class="swatch red" id="turnSwatch"></span>

      <div class="tally">

          <select id="ckModelSel"><option>loading…</option></select>
          <button class="ai-refresh" id="ckRefresh" title="Re-scan for installed models">↻</button>
        </div>
        <div class="ai-row ck-side-row">
          <span class="ai-label">Endpoint</span>
          <input type="text" id="ckEndpoint" value="http://localhost:11434">
        </div>
        <div class="ai-statusline"><span class="ai-dot" id="ckDot"></span><span id="ckStatus">Built-in AI ready.</span></div>
        <div class="ai-think" id="ckThink"></div>
        <div class="ai-hint">
          The computer uses a built-in minimax AI by default. Tick the box to let a model on
          <em>your</em> machine choose its moves · <a href="../../ai-setup.html">connect a model ▸</a>
        </div>
      </div>
    </div>
  </div>

<script src="../../lib/byom.js"></script>
<script>
"use strict";

/* ============================================================
   Checkers (American / English draughts) — single file.
   8x8, pieces on dark squares. Forced captures, multi-jump
   chains, promotion to King ends the move. Red moves up
   (toward row 0), White moves down (toward row 7). Red first.
   ============================================================ */

const COLS = "abcdefgh";
const sqName = (r, c) => COLS[c] + (8 - r);

let board, turn, gameOver, selected, chaining, lastMove;
let history = [], snapTaken = false;

let mode = "pvp";          // 'pvp' | 'ai'
let aiColor = "w";         // computer's colour in 'ai'
let aiDepth = 4;           // minimax depth
let aiThinking = false;
let forcedJumps = true;    // standard rule: must take an available jump (toggle to relax)

const inB = (r, c) => r >= 0 && r < 8 && c >= 0 && c < 8;
const opp = c => (c === "r" ? "w" : "r");
const cloneBoard = b => b.map(row => row.map(p => (p ? { color: p.color, king: p.king } : null)));

function initialBoard() {
  const b = Array.from({ length: 8 }, () => Array(8).fill(null));
  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
    if ((r + c) % 2 !== 1) continue;           // only dark squares
    if (r < 3) b[r][c] = { color: "w", king: false };
    else if (r > 4) b[r][c] = { color: "r", king: false };
  }
  return b;
}

function dirsFor(p) {
  if (p.king) return [[-1,-1],[-1,1],[1,-1],[1,1]];
  return p.color === "r" ? [[-1,-1],[-1,1]] : [[1,-1],[1,1]];
}

// single non-capture steps from (r,c)
function pieceSteps(b, r, c) {
  const p = b[r][c]; if (!p) return [];
  const out = [];
  for (const [dr, dc] of dirsFor(p)) {
    const tr = r + dr, tc = c + dc;
    if (inB(tr, tc) && !b[tr][tc]) out.push({ to: { r: tr, c: tc }, over: null });
  }
  return out;
}

// single jumps from (r,c)
function pieceJumps(b, r, c) {
  const p = b[r][c]; if (!p) return [];
  const out = [];
  for (const [dr, dc] of dirsFor(p)) {
    const mr = r + dr, mc = c + dc, tr = r + 2*dr, tc = c + 2*dc;
    if (inB(tr, tc) && !b[tr][tc] && b[mr] && b[mr][mc] && b[mr][mc].color === opp(p.color))
      out.push({ to: { r: tr, c: tc }, over: { r: mr, c: mc } });
  }
  return out;
}

function sideHasJump(b, color) {
  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++)
    if (b[r][c] && b[r][c].color === color && pieceJumps(b, r, c).length) return true;
  return false;
}

function promotes(p, r) { return !p.king && ((p.color === "r" && r === 0) || (p.color === "w" && r === 7)); }

/* ---- full-move generation (for AI + model) ---- */
function genMoves(b, color) {
  const caps = [];
  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++)
    if (b[r][c] && b[r][c].color === color) dfsCaps(b, [r, c], r, c, b[r][c], [], [], caps);
  if (caps.length && forcedJumps) return caps;   // standard rule: captures are mandatory
  const steps = [];
  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++)
    if (b[r][c] && b[r][c].color === color)
      for (const s of pieceSteps(b, r, c)) steps.push({ from: [r, c], steps: [[s.to.r, s.to.c]], captured: [] });
  return [...caps, ...steps];   // optional mode: jumps and plain moves both allowed
}
function dfsCaps(b, from, r, c, piece, path, captured, out) {
  const js = pieceJumps(b, r, c);
  let any = false;
  for (const j of js) {
    if (captured.some(k => k[0] === j.over.r && k[1] === j.over.c)) continue;
    const nb = cloneBoard(b);
    nb[r][c] = null; nb[j.over.r][j.over.c] = null;
    const np = { color: piece.color, king: piece.king };
    const promoted = promotes(np, j.to.r); if (promoted) np.king = true;
    nb[j.to.r][j.to.c] = np;
    const ncap = [...captured, [j.over.r, j.over.c]];
    const npath = [...path, [j.to.r, j.to.c]];
    if (promoted) { out.push({ from, steps: npath, captured: ncap }); any = true; }
    else {
      const before = out.length;
      dfsCaps(nb, from, j.to.r, j.to.c, np, npath, ncap, out);
      if (out.length > before) any = true; else { out.push({ from, steps: npath, captured: ncap }); any = true; }
    }
  }
  return any;
}
function applyFull(b, m) {
  const p = b[m.from[0]][m.from[1]];
  b[m.from[0]][m.from[1]] = null;
  for (const [r, c] of m.captured) b[r][c] = null;
  const to = m.steps[m.steps.length - 1];
  const king = p.king || promotes(p, to[0]);
  b[to[0]][to[1]] = { color: p.color, king };
  return b;
}
function moveNotation(m) {
  const sep = m.captured.length ? "x" : "-";
  return [sqName(m.from[0], m.from[1]), ...m.steps.map(s => sqName(s[0], s[1]))].join(sep);
}

/* ---- minimax (built-in AI) ---- */
function evaluate(b, ai) {
  let s = 0;
  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
    const p = b[r][c]; if (!p) continue;
    let v = p.king ? 185 : 100;
    if (!p.king) v += (p.color === "r" ? (7 - r) : r) * 4;     // advancement toward promotion
    if (c >= 2 && c <= 5) v += 3;                              // central files
    if ((p.color === "r" && r === 7) || (p.color === "w" && r === 0)) v += 6;  // hold the back row
    s += (p.color === ai ? v : -v);
  }
  return s;
}
function minimax(b, color, depth, alpha, beta, ai) {
  const moves = genMoves(b, color);
  if (!moves.length) return color === ai ? -100000 - depth : 100000 + depth;   // side to move is stuck → loses
  if (depth === 0) return evaluate(b, ai);
  if (color === ai) {
    let best = -Infinity;
    for (const m of moves) {
      best = Math.max(best, minimax(applyFull(cloneBoard(b), m), opp(color), depth - 1, alpha, beta, ai));
      alpha = Math.max(alpha, best); if (alpha >= beta) break;
    }
    return best;
  } else {
    let best = Infinity;
    for (const m of moves) {
      best = Math.min(best, minimax(applyFull(cloneBoard(b), m), opp(color), depth - 1, alpha, beta, ai));
      beta = Math.min(beta, best); if (beta <= alpha) break;
    }
    return best;
  }
}
function bestMove(b, color, depth) {
  const moves = genMoves(b, color);
  if (!moves.length) return null;
  // light shuffle so equal-value games vary
  for (let i = moves.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [moves[i], moves[j]] = [moves[j], moves[i]]; }
  let best = moves[0], bestVal = -Infinity;
  for (const m of moves) {
    const v = minimax(applyFull(cloneBoard(b), m), opp(color), depth - 1, -Infinity, Infinity, color);
    if (v > bestVal) { bestVal = v; best = m; }
  }
  return best;
}

/* ---- rendering ---- */
const boardEl = document.getElementById("board");
function legalTargets() {
  if (!selected) return [];
  const { r, c } = selected;
  if (chaining) return pieceJumps(board, r, c);          // a started chain must be completed
  const jumps = pieceJumps(board, r, c);
  if (forcedJumps && sideHasJump(board, turn)) return jumps;
  return [...jumps, ...pieceSteps(board, r, c)];          // optional mode: jumps + plain steps
}
function selectable(r, c) {
  const p = board[r][c];
  if (!p || p.color !== turn) return false;
  if (forcedJumps && sideHasJump(board, turn)) return pieceJumps(board, r, c).length > 0;
  return pieceJumps(board, r, c).length > 0 || pieceSteps(board, r, c).length > 0;
}

function render() {
  boardEl.innerHTML = "";
  const targets = legalTargets();
  const tset = new Map(targets.map(t => [t.to.r * 8 + t.to.c, t]));
  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) {
    const sq = document.createElement("div");
    const dark = (r + c) % 2 === 1;
    sq.className = "sq " + (dark ? "dark" : "light");
    if (selected && selected.r === r && selected.c === c) sq.classList.add("sel");
    if (lastMove && lastMove.some(([lr, lc]) => lr === r && lc === c)) sq.classList.add("lastmove");

    if (c === 0) { const e = document.createElement("span"); e.className = "coord rank"; e.textContent = 8 - r; sq.appendChild(e); }
    if (r === 7) { const e = document.createElement("span"); e.className = "coord file"; e.textContent = COLS[c]; sq.appendChild(e); }

    const p = board[r][c];
    if (p) {
      const d = document.createElement("div");
      d.className = "disc " + (p.color === "r" ? "red" : "white");
      if (p.king) { const k = document.createElement("span"); k.className = "crown"; k.textContent = "♛"; d.appendChild(k); }
      sq.appendChild(d);
    }
    if (tset.has(r * 8 + c)) {
      const t = tset.get(r * 8 + c);
      const mk = document.createElement("div"); mk.className = t.over ? "ring" : "dot"; sq.appendChild(mk);
    }
    if (dark) sq.addEventListener("click", () => onSquareClick(r, c));
    boardEl.appendChild(sq);
  }
  updatePanel();
}

function updatePanel() {
  const sw = document.getElementById("turnSwatch");
  sw.className = "swatch " + (turn === "r" ? "red" : "white");
  document.getElementById("turnText").textContent = gameOver ? "Game over" : (turn === "r" ? "Red" : "White") + " to move";

  let redOn = 0, whiteOn = 0;
  for (let r = 0; r < 8; r++) for (let c = 0; c < 8; c++) { const p = board[r][c]; if (p) (p.color === "r" ? redOn++ : whiteOn++); }
  document.getElementById("redLost").textContent = 12 - redOn;
  document.getElementById("whiteLost").textContent = 12 - whiteOn;

  const st = document.getElementById("status");
  st.className = "status";
  if (gameOver) {
    st.classList.add("over");
    const wName = gameOver.winner === "r" ? "Red" : "White";
    st.textContent = (mode === "ai" && gameOver.winner === aiColor) ? "Computer (" + wName + ") wins!" : wName + " wins!";
  } else if (aiThinking) {
    st.textContent = "Computer is thinking…";
  } else if (chaining) {
    st.textContent = "Keep jumping!";
  } else if (forcedJumps && sideHasJump(board, turn)) {
    st.textContent = "Forced — you must jump.";
  } else if (sideHasJump(board, turn)) {
    st.textContent = "Jump available.";
  } else {
    st.textContent = "";
  }
  document.getElementById("undoBtn").disabled = history.length === 0 || aiThinking;
}

/* ---- interaction ---- */
function maybeSnap() { if (!snapTaken) { history.push({ board: cloneBoard(board), turn }); snapTaken = true; } }
function isAITurn() { return mode === "ai" && turn === aiColor; }

function onSquareClick(r, c) {
  if (gameOver || aiThinking || isAITurn()) return;
  const p = board[r][c];
  if (selected) {
    const t = legalTargets().find(t => t.to.r === r && t.to.c === c);
    if (t) { applyHumanMove(t); return; }
    if (!chaining && selectable(r, c)) { selected = { r, c }; render(); return; }
    if (!chaining) { selected = null; render(); }
    return;
  }
  if (selectable(r, c)) { selected = { r, c }; render(); }
}

function applyHumanMove(t) {
  maybeSnap();
  const from = selected;
  const piece = board[from.r][from.c];
  board[from.r][from.c] = null;
  let promoted = false;
  if (t.over) board[t.over.r][t.over.c] = null;
  if (promotes(piece, t.to.r)) { piece.king = true; promoted = true; }
  board[t.to.r][t.to.c] = piece;
  lastMove = [[from.r, from.c], [t.to.r, t.to.c]];

  if (t.over && !promoted && pieceJumps(board, t.to.r, t.to.c).length) {
    chaining = true; selected = { r: t.to.r, c: t.to.c }; render(); return;   // must continue
  }
  selected = null; chaining = false;
  endTurn();
}

function endTurn() {
  turn = opp(turn); snapTaken = false; selected = null; chaining = false;
  if (!genMoves(board, turn).length) gameOver = { winner: opp(turn) };
  render();
  if (!gameOver && isAITurn()) scheduleAI();
}

/* ---- computer turn ---- */
function scheduleAI() { aiThinking = true; render(); setTimeout(runAI, 260); }
async function runAI() {
  if (gameOver || !isAITurn()) { aiThinking = false; return; }
  let move = null, source = "builtin";
  if (modelActive()) {
    try { move = await modelMove(); if (move) source = "model"; } catch (e) { /* fall through */ }
  }
  if (!move) { move = bestMove(board, aiColor, aiDepth); if (modelActive()) source = "fallback"; }
  maybeSnap();
  applyFull(board, move);
  lastMove = [move.from, move.steps[move.steps.length - 1]];
  aiThinking = false;
  const note = moveNotation(move);
  if (source === "model") setCkStatus("Model played " + note + ".", "on");
  else if (source === "fallback") setCkStatus("Model reply unclear — built-in played " + note + ".", "err");
  else setCkStatus("Built-in AI played " + note + ".", "on");
  endTurn();
}

/* ---- undo ---- */
function undo() {
  if (!history.length || aiThinking) return;
  let snap = history.pop();
  board = snap.board; turn = snap.turn;
  // in vs-AI, step back past the computer's reply too
  if (mode === "ai" && turn === aiColor && history.length) { snap = history.pop(); board = snap.board; turn = snap.turn; }
  gameOver = null; selected = null; chaining = false; snapTaken = false; lastMove = null;
  render();
}

/* ---- new game / mode ---- */
function newGame() {
  board = initialBoard(); turn = "r"; gameOver = null; selected = null; chaining = false;
  lastMove = null; history = []; snapTaken = false; aiThinking = false;
  if (ckController) { try { ckController.abort(); } catch (e) {} ckController = null; }
  ckThink.classList.remove("show"); ckThink.textContent = "";
  render();
  if (isAITurn()) scheduleAI();
}

/* ---- local model (shared BYOM) ---- */
const ckUseModel = document.getElementById("ckUseModel");
const ckModelSel = document.getElementById("ckModelSel");
const ckEndpoint = document.getElementById("ckEndpoint");
const ckThink = document.getElementById("ckThink");
const ckStatusEl = document.getElementById("ckStatus");
const ckDot = document.getElementById("ckDot");
const ckAiPanel = document.getElementById("ckAi");
let ckController = null;

function modelActive() {
  return mode === "ai" && typeof XenoBYOM !== "undefined" && XenoBYOM.isLocal() &&
    ckUseModel.checked && ckModelSel.value && !ckModelSel.disabled;
}
function endpointBase() { return (ckEndpoint.value || "http://localhost:11434").replace(/\/$/, ""); }
function setCkStatus(t, s) { ckStatusEl.textContent = t; ckDot.className = "ai-dot" + (s ? " " + s : ""); }

function asciiBoard() {
  let s = "    " + COLS.split("").join(" ") + "\n";
  for (let r = 0; r < 8; r++) {
    s += " " + (8 - r) + "  ";
    for (let c = 0; c < 8; c++) {
      const p = board[r][c];
      s += (p ? (p.color === "r" ? (p.king ? "R" : "r") : (p.king ? "W" : "w")) : ((r + c) % 2 === 1 ? "." : " ")) + " ";
    }
    s += "\n";
  }
  return s;
}
async function modelMove() {
  const moves = genMoves(board, aiColor);
  if (!moves.length) return null;
  const me = aiColor === "r" ? "Red" : "White";
  const list = moves.map((m, i) => `${i + 1}. ${moveNotation(m)}`).join("   ");
  const system =
`You are a strong checkers (American draughts) engine playing ${me}. Lowercase r/w are men, uppercase R/W are kings. Red moves up the board, White moves down. Captures are mandatory and multi-jumps are shown as one move (a1xc3xe5).
You will get the board and a NUMBERED list of every legal move. Pick exactly one by its number. Reply with at most one short sentence, then a final line exactly:
MOVE: <number>`;
  const user =
`Board (uppercase = kings, '.' = empty dark square):
${asciiBoard()}
You are ${me}. Legal moves:
${list}

Pick the best move and give your MOVE: line.`;
  ckThink.classList.add("show"); ckThink.textContent = "";
  ckController = new AbortController();
  const killer = setTimeout(() => { try { ckController.abort(); } catch (e) {} }, 45000);
  let reply = "";
  try {
    reply = await XenoBYOM.chat({
      endpoint: endpointBase(), model: ckModelSel.value,
      messages: [{ role: "system", content: system }, { role: "user", content: user }],
      temperature: 0.4, maxTokens: 700,
      onToken: d => { ckThink.textContent += d; ckThink.scrollTop = ckThink.scrollHeight; },
      onThinking: d => { ckThink.textContent += d; ckThink.scrollTop = ckThink.scrollHeight; },
      signal: ckController.signal,
    });
  } finally { clearTimeout(killer); ckController = null; }
  // 1) MOVE: <n>
  const mi = reply.match(/MOVE:\s*(\d{1,3})/i);
  if (mi) { const k = +mi[1] - 1; if (k >= 0 && k < moves.length) return moves[k]; }
  // 2) any bare number that indexes the list
  const num = reply.match(/\b(\d{1,3})\b/);
  if (num) { const k = +num[1] - 1; if (k >= 0 && k < moves.length) return moves[k]; }
  // 3) match a notation string
  const norm = reply.toLowerCase().replace(/\s+/g, "");
  for (const m of moves) if (norm.includes(moveNotation(m).toLowerCase())) return m;
  return null;
}

async function loadModels() {
  if (typeof XenoBYOM === "undefined" || !XenoBYOM.isLocal()) return;
  XenoBYOM.saveConfig({ endpoint: endpointBase() });
  ckModelSel.disabled = true; ckModelSel.innerHTML = "<option>loading…</option>";
  const saved = XenoBYOM.loadConfig().model;
  const res = await XenoBYOM.test({ endpoint: endpointBase() });
  if (!res.ok) {
    ckModelSel.innerHTML = '<option value="">— not reachable —</option>';
    setCkStatus(res.error.message + " — built-in AI will play instead.", "err");
    return;
  }
  ckModelSel.innerHTML = res.models.map(n => `<option value="${n}">${n}</option>`).join("");
  ckModelSel.disabled = false;
  const fav = res.models.indexOf(saved) >= 0 ? saved
    : (res.models.find(n => /llama3\.2:3b|qwen2\.5|3b|7b|8b|mini|small/i.test(n)) || res.models[0]);
  ckModelSel.value = fav; XenoBYOM.saveConfig({ model: fav });
  setCkStatus("Model ready — " + res.models.length + " via " + res.provider + ".", "on");
}

/* ---- wiring ---- */
document.getElementById("modeSeg").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  mode = b.dataset.mode;
  [...e.currentTarget.children].forEach(x => x.classList.toggle("active", x === b));
  document.getElementById("sideField").style.display = mode === "ai" ? "" : "none";
  document.getElementById("aiSideField").style.display = mode === "ai" ? "" : "none";
  ckAiPanel.classList.toggle("hide-side", mode !== "ai");
  newGame();
});
document.getElementById("forcedSeg").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  forcedJumps = b.dataset.f === "1";
  [...e.currentTarget.children].forEach(x => x.classList.toggle("active", x === b));
  if (!chaining) selected = null;   // don't strand a mid-chain jump
  render();
});
document.getElementById("diffSeg").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  aiDepth = +b.dataset.d;
  [...e.currentTarget.children].forEach(x => x.classList.toggle("active", x === b));
});
document.getElementById("aiColorSeg").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  aiColor = b.dataset.c;
  [...e.currentTarget.children].forEach(x => x.classList.toggle("active", x === b));
  newGame();
});
document.getElementById("newBtn").addEventListener("click", newGame);
document.getElementById("undoBtn").addEventListener("click", undo);
ckModelSel.addEventListener("change", () => XenoBYOM.saveConfig({ model: ckModelSel.value }));
document.getElementById("ckRefresh").addEventListener("click", loadModels);
ckEndpoint.addEventListener("change", loadModels);

/* ---- boot ---- */
ckAiPanel.classList.add("hide-side");
newGame();
if (typeof XenoBYOM !== "undefined" && XenoBYOM.isLocal()) {
  ckEndpoint.value = XenoBYOM.loadConfig().endpoint || "http://localhost:11434";
  loadModels();
}
</script>
