<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sand Garden — AI Data</title>
<style>
  :root {
    --bg: #0c0d0f; --bg-2: #131417; --panel: #131417; --panel-2: #1a1c20;
    --edge: #24262b; --ink: #e7e6e0; --dim: #8a8d93; --accent: #9b86c4; --good: #9ec27a;
    --on-accent: #0c0d0f;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg);
    color: var(--ink); font: 13px/1.5 var(--mono); min-height: 100vh;
  }
  header {
    display: flex; align-items: center; gap: 12px; padding: 14px 20px;
    border-bottom: 1px solid var(--edge); position: sticky; top: 0;
    background: var(--panel); z-index: 5;
  }
  header h1 { font-size: 15px; margin: 0; letter-spacing: .3px; text-transform: uppercase; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--dim); }
  .dot.live { background: var(--good); animation: pulse 1.4s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }
  .meta { color: var(--dim); font-size: 11px; margin-left: auto; text-align: right; }
  .meta b { color: var(--ink); }
  main { padding: 18px 20px 60px; max-width: 1300px; margin: 0 auto; }
  .sub { font-size: 10px; text-transform: uppercase; letter-spacing: 1.2px; color: var(--dim); margin: 22px 2px 10px; }
  .summary { display: flex; gap: 10px; flex-wrap: wrap; }
  .stat { background: var(--panel); border: 1px solid var(--edge); border-radius: 0; padding: 10px 16px; }
  .stat .n { font-size: 22px; font-weight: 800; }
  .stat .l { color: var(--dim); font-size: 10px; text-transform: uppercase; letter-spacing: .8px; }

  .cards { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 14px; }
  .card { background: var(--panel); border: 1px solid var(--edge); border-radius: 0; padding: 14px 15px; }
  .card .head { display: flex; align-items: baseline; gap: 8px; margin-bottom: 4px; }
  .card .model { font-weight: 800; font-size: 14px; }
  .card .moves { color: var(--dim); font-size: 11px; margin-left: auto; }
  .bars { margin-top: 8px; }
  .bar { display: grid; grid-template-columns: 78px 1fr 34px; align-items: center; gap: 8px; margin: 3px 0; }
  .bar .name { font-size: 11px; color: var(--ink); text-align: right; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar .track { height: 13px; background: var(--bg-2); border-radius: 0; overflow: hidden; }
  .bar .fill { height: 100%; border-radius: 0; min-width: 2px; transition: width .4s ease; }
  .bar .cnt { font-size: 11px; color: var(--dim); font-variant-numeric: tabular-nums; }

  .chips { display: flex; gap: 6px; flex-wrap: wrap; margin: 6px 2px 12px; }
  .chip {
    font-size: 11px; padding: 4px 11px; border-radius: 0; cursor: pointer;
    background: var(--bg-2); border: 1px solid var(--edge); color: var(--dim);
  }
  .chip.on { background: var(--accent); color: var(--on-accent); border-color: var(--accent); font-weight: 700; }

  .wish { background: var(--panel); border: 1px solid var(--edge); border-radius: 0; padding: 11px 13px; margin-bottom: 9px; }
  .wish .top { display: flex; align-items: center; gap: 8px; margin-bottom: 5px; font-size: 10.5px; }
  .badge { padding: 2px 8px; border-radius: 0; font-weight: 700; font-size: 10px; border: 1px solid var(--edge); }
  .badge.model { background: var(--bg-2); color: var(--accent); }
  .badge.reflection { background: var(--bg-2); color: var(--good); }
  .badge.inline { background: var(--bg-2); color: #c7a24a; }
  .wish .when { color: var(--dim); margin-left: auto; }
  .wish .text { color: var(--ink); font-size: 12.5px; }
  .empty { color: var(--dim); padding: 30px 0; text-align: center; }
</style>
</head>
<body>
<header>
  <span class="dot" id="dot"></span>
  <h1>Sand Garden — AI Data</h1>
  <div class="meta" id="meta">connecting…</div>
</header>
<main>
  <div class="summary" id="summary"></div>

  <div class="sub">element &amp; tool usage — per model</div>
  <div class="cards" id="usage"></div>

  <div class="sub">game-improvement wishes</div>
  <div class="chips" id="filters"></div>
  <div id="wishes"></div>
</main>

<script>
// rough colors so each material reads at a glance (matches the game palette)
const COLOR = {
  water:'#5aa7e8', fire:'#ff8c4a', plant:'#5fbf6e', stone:'#a09cab', lava:'#ff6b3d',
  vine:'#2e8b57', crystal:'#8ee4ff', sparkle:'#ffd97a', sand:'#ffd97a', ice:'#bfe8ff',
  seed:'#d9b36c', wood:'#8a8a9a', brick:'#c0392b', mud:'#a07a52', salt:'#eef1f6',
  honey:'#e8a23d', lightning:'#f6f29b', void:'#9a5cf0', dream:'#c3a6ff', shadow:'#6f6590',
  bird:'#6b8e23', birds:'#6b8e23', fish:'#ff8a4c', cloud:'#a8c5e0', bounce:'#ffcc66', ash:'#a8a3ad',
};
const colorFor = (k) => COLOR[k] || '#9b86c4';
const esc = (s) => String(s).replace(/[&<>]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

function ago(ts) {
  const s = Math.max(0, (Date.now() - new Date(ts).getTime()) / 1000);
  if (s < 60) return Math.round(s) + 's ago';
  if (s < 3600) return Math.round(s / 60) + 'm ago';
  if (s < 86400) return Math.round(s / 3600) + 'h ago';
  return Math.round(s / 86400) + 'd ago';
}

let filter = '*';   // which model's wishes to show ('*' = all)

function render(d) {
  document.getElementById('dot').classList.toggle('live', !!d.running);
  document.getElementById('meta').innerHTML =
    `model: <b>${esc(d.model || '—')}</b> · ${d.running ? 'playing' : 'idle'} · updated ${new Date().toLocaleTimeString()}`;

  const models = Object.keys(d.usage || {});
  const totalMoves = models.reduce((a, m) => a + (d.usage[m].moves || 0), 0);

  // summary strip
  document.getElementById('summary').innerHTML = [
    ['models played', models.length],
    ['total moves', totalMoves],
    ['wishes collected', (d.wishes || []).length],
  ].map(([l, n]) => `<div class="stat"><div class="n">${n}</div><div class="l">${l}</div></div>`).join('');

  // per-model usage cards
  document.getElementById('usage').innerHTML = models.length ? models.map((m) => {
    const u = d.usage[m];
    const els = Object.entries(u.elements || {}).sort((a, b) => b[1] - a[1]);
    const max = els.length ? els[0][1] : 1;
    const bars = els.map(([k, c]) => `
      <div class="bar">
        <span class="name" title="${esc(k)}">${esc(k)}</span>
        <span class="track"><span class="fill" style="width:${Math.round(c / max * 100)}%;background:${colorFor(k)}"></span></span>
        <span class="cnt">${c}</span>
      </div>`).join('');
    return `<div class="card">
      <div class="head"><span class="model">${esc(m)}</span>
        <span class="moves">${u.moves || 0} moves · ${els.length} kinds</span></div>
      <div class="bars">${bars || '<div class="empty">no moves yet</div>'}</div>
    </div>`;
  }).join('') : '<div class="empty">No usage yet — start the AI in the game tab.</div>';

  // wish filter chips
  const chips = ['*', ...models];
  document.getElementById('filters').innerHTML = chips.map((m) =>
    `<span class="chip ${filter === m ? 'on' : ''}" data-m="${esc(m)}">${m === '*' ? 'all models' : esc(m)}</span>`).join('');
  document.querySelectorAll('.chip').forEach((c) => c.onclick = () => { filter = c.dataset.m; render(window.__d); });

  // wishes feed (newest first)
  const wishes = (d.wishes || [])
    .filter((w) => filter === '*' || w.model === filter)
    .slice().reverse();
  document.getElementById('wishes').innerHTML = wishes.length ? wishes.map((w) => `
    <div class="wish">
      <div class="top">
        <span class="badge model">${esc(w.model || '?')}</span>
        <span class="badge ${w.source === 'inline' ? 'inline' : 'reflection'}">${esc(w.source || 'reflection')}</span>
        <span class="when">${w.ts ? ago(w.ts) : ''}</span>
      </div>
      <div class="text">${esc(w.wish || '')}</div>
    </div>`).join('') : '<div class="empty">No wishes yet — they appear as the AI reflects (every few moves).</div>';
}

async function poll() {
  try {
    const r = await fetch('/api/data', { cache: 'no-store' });
    const d = await r.json();
    window.__d = d;
    render(d);
  } catch (e) {
    document.getElementById('dot').classList.remove('live');
    document.getElementById('meta').textContent = 'bridge offline — run: node server.js';
  }
}
poll();
setInterval(poll, 2500);
</script>
</body>
</html>
