<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Backgammon</title>
<!-- hide the BYO-model panel on the public site (AI only works when run locally) -->
<script>try{var h=location.hostname;if(!(location.protocol==='file:'||/^(localhost|127\.0\.0\.1|0\.0\.0\.0|::1|\[::1\])$/i.test(h)||/\.local$/i.test(h)))document.documentElement.className+=' hosted';}catch(e){}</script>
<style>
  html.hosted .ai-only { display: none !important; }
  /* ---- house style · signature hue: amber (muted) ---- */
  :root {
    --bg: #0c0d0f;
    --bg-2: #131417;
    --panel: #131417;
    --panel-2: #1a1c20;
    --grid: #24262b;
    --line: #313338;
    --felt: #131417;
    --pt-a: #2a2c31;             /* light point */
    --pt-b: #1a1c20;             /* dark point */
    --text: #e7e6e0;
    --muted: #8a8d93;
    --accent: #c7a24a;           /* muted amber */
    --on-accent: #0c0d0f;
    --white: #d8cfb8;            /* cream checkers */
    --white-2: #a89e84;
    --black: #2b333d;            /* slate checkers */
    --black-2: #161b21;
    --black-rim: #5fb6b0;        /* cool muted rim for dark checkers */
    --gold: #c7a24a;
    --mono: ui-monospace, "SF Mono", "Cascadia Mono", Menlo, Consolas, monospace;
    --pt-w: clamp(24px, 4.6vw, 40px);
    --pt-h: clamp(128px, 27vw, 210px);
    --chk: clamp(20px, 4.1vw, 36px);
  }

  * { box-sizing: border-box; }

  body {
    margin: 0; background: var(--bg); color: var(--text); font-family: var(--mono);
    min-height: 100vh; display: flex; flex-direction: column; align-items: center;
    padding: 30px 14px 60px;
  }

  h1 {
    text-align: center; margin: 0 0 6px; font-weight: 700;
    letter-spacing: 4px; text-transform: uppercase; font-size: clamp(28px, 6vw, 50px);
    color: var(--text);
  }
  .subtitle { text-align: center; color: var(--muted); font-size: 11px; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 20px; }

  .game { display: flex; gap: 24px; align-items: flex-start; flex-wrap: wrap; justify-content: center; }

  /* ---- dice ---- */
  .dicewrap { display: flex; align-items: center; justify-content: center; gap: 14px; min-height: 52px; margin-bottom: 14px; }
  .die {
    width: 42px; height: 42px; border-radius: 6px; background: var(--white);
    display: grid; grid-template-columns: repeat(3,1fr); grid-template-rows: repeat(3,1fr);
    padding: 6px; transition: opacity .2s, transform .2s;
  }
  .die.used { opacity: .28; transform: scale(.86); }
  .die .pip { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; }
  .die .pip i { width: 7px; height: 7px; border-radius: 50%; background: #0c0d0f; }
  .dice-hint { color: var(--muted); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }

  /* ---- board ---- */
  .board-wrap { display: flex; gap: 8px; align-items: stretch; }
  .board {
    display: flex; flex-direction: column; gap: 0; padding: 10px; background: var(--felt);
    border: 1px solid var(--grid); border-radius: 0;
    user-select: none;
  }
  .half { display: flex; align-items: stretch; }
  .half.bottom { margin-top: 6px; }
  .quad { display: flex; gap: 2px; }

  .point { position: relative; width: var(--pt-w); height: var(--pt-h); cursor: default; }
  .point .tri { position: absolute; inset: 0; }
  .half.top .point .tri { clip-path: polygon(0 0, 100% 0, 50% 100%); }
  .half.bottom .point .tri { clip-path: polygon(50% 0, 0 100%, 100% 100%); }
  .point.tri-a .tri { background: var(--pt-a); }
  .point.tri-b .tri { background: var(--pt-b); }
  .half.bottom .point.tri-a .tri { background: var(--pt-a); }
  .half.bottom .point.tri-b .tri { background: var(--pt-b); }

  .point .num { position: absolute; left: 0; right: 0; text-align: center; font-size: 8px; color: var(--muted); opacity: .6; pointer-events: none; }
  .half.top .point .num { top: -10px; }
  .half.bottom .point .num { bottom: -10px; }

  .point.src { cursor: pointer; }
  .point.src .tri { box-shadow: inset 0 0 0 2px var(--accent); }
  .point.sel .tri { box-shadow: inset 0 0 0 3px var(--accent); }
  .point.dst { cursor: pointer; }
  .point.dst::after {
    content: ""; position: absolute; left: 50%; top: 50%; width: 46%; height: 46%;
    transform: translate(-50%,-50%); border-radius: 50%;
    border: 3px solid var(--accent); z-index: 5;
  }

  .stack { position: absolute; left: 0; right: 0; display: flex; flex-direction: column; align-items: center; gap: 1px; z-index: 2; }
  .half.top .stack { top: 2px; }
  .half.bottom .stack { bottom: 2px; flex-direction: column-reverse; }

  .checker {
    width: var(--chk); height: var(--chk); border-radius: 50%; position: relative; flex: none;
    display: flex; align-items: center; justify-content: center; font-size: calc(var(--chk) * .42); font-weight: 800;
  }
  .checker.w { background: var(--white);
               box-shadow: inset 0 0 0 1px var(--white-2); color: #3a3322; }
  .checker.b { background: var(--black);
               box-shadow: inset 0 0 0 1px var(--black-rim); color: #cfe4e2; }

  /* ---- bar (center divider) ---- */
  .bar {
    width: clamp(28px, 5vw, 44px); background: var(--bg-2);
    border-left: 1px solid var(--grid); border-right: 1px solid var(--grid);
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start; gap: 2px;
    padding: 4px 0; position: relative;
  }
  .half.bottom .bar { justify-content: flex-end; }
  .bar.src { cursor: pointer; box-shadow: inset 0 0 0 2px var(--accent); }
  .bar.sel { box-shadow: inset 0 0 0 3px var(--accent); }

  /* ---- bear-off trays ---- */
  .offcol { display: flex; flex-direction: column; gap: 6px; }
  .tray {
    flex: 1; width: clamp(34px, 6vw, 52px); background: var(--bg-2);
    border: 1px solid var(--grid); border-radius: 0;
    display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
    gap: 3px; padding: 8px 4px; position: relative;
  }
  .tray .lab { font-size: 8px; letter-spacing: 1px; text-transform: uppercase; color: var(--muted); }
  .tray .big { font-size: 22px; font-weight: 700; }
  .tray.w .big { color: var(--white); } .tray.b .big { color: var(--black-rim); }
  .tray.dst { cursor: pointer; border-color: var(--accent); box-shadow: inset 0 0 0 2px var(--accent); }
  .tray .bar-off { width: 70%; height: 5px; border-radius: 0; }
  .tray.w .bar-off { background: var(--white); } .tray.b .bar-off { background: var(--black-rim); }

  /* ---- side panel ---- */
  .panel {
    background: var(--panel); border: 1px solid var(--grid); border-radius: 0;
    padding: 18px; width: 248px;
  }
  .field { display: flex; flex-direction: column; gap: 7px; margin-bottom: 14px; }
  .field > label { font-size: 10px; color: var(--muted); letter-spacing: 2px; text-transform: uppercase; }
  .seg { display: flex; gap: 6px; flex-wrap: wrap; }
  .seg-btn {
    padding: 8px 12px; border: 1px solid var(--grid); border-radius: 0; background: var(--bg-2); color: var(--muted);
    font-family: var(--mono); font-weight: 700; letter-spacing: 1px; text-transform: uppercase; cursor: pointer; font-size: 11px;
    transition: color .12s, border-color .12s, background .12s;
  }
  .seg-btn:hover { color: var(--text); border-color: var(--muted); }
  .seg-btn.active { border-color: var(--accent); color: var(--accent); background: var(--panel-2); }

  .turn { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }
  .turn .swatch { width: 18px; height: 18px; border-radius: 50%; border: 1px solid var(--grid); }
  .turn .swatch.w { background: var(--white); } .turn .swatch.b { background: var(--black); border-color: var(--black-rim); }

  .status { min-height: 22px; font-size: 12px; letter-spacing: 1px; text-transform: uppercase; color: var(--accent); font-weight: 700; margin-bottom: 12px; line-height: 1.5; }
  .status.over { color: var(--gold); }

  .tally { display: flex; justify-content: space-between; font-size: 12px; color: var(--muted); margin-bottom: 14px; }
  .tally b { color: var(--text); }

  .buttons { display: flex; gap: 8px; }
  button.act {
    flex: 1; background: var(--panel); color: var(--text); border: 1px solid var(--grid); border-radius: 0;
    padding: 10px; font-size: 13px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; font-family: var(--mono);
    cursor: pointer; transition: background .15s, border-color .15s, color .15s, transform .08s;
  }
  button.act:hover { border-color: var(--accent); color: var(--accent); }
  button.act:active { transform: translateY(1px); }
  button.act.secondary { color: var(--muted); border-color: var(--grid); }
  button.act.secondary:hover { border-color: var(--muted); color: var(--text); }
  button.act:disabled { opacity: .4; cursor: default; }
  button.act:disabled:hover { background: var(--panel); color: var(--muted); border-color: var(--grid); }

  /* ---- AI panel (local only) ---- */
  #bgAi { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--grid); display: flex; flex-direction: column; gap: 9px; font-size: 12px; }
  #bgAi .ai-row { display: flex; align-items: center; gap: 8px; }
  #bgAi .ai-label { width: 58px; flex: none; color: var(--muted); font-size: 10px; text-transform: uppercase; letter-spacing: 1px; }
  #bgAi label.chk { display: flex; align-items: center; gap: 8px; color: var(--muted); cursor: pointer; font-size: 11px; }
  #bgAi label.chk input { accent-color: var(--accent); }
  #bgAi select, #bgAi input[type=text] { flex: 1; min-width: 0; background: var(--bg-2); color: var(--text); border: 1px solid var(--grid); border-radius: 0; padding: 5px 7px; font-size: 12px; font-family: var(--mono); }
  #bgAi select:focus, #bgAi input[type=text]:focus { outline: none; border-color: var(--accent); }
  #bgAi .ai-refresh { flex: none; background: var(--bg-2); color: var(--accent); border: 1px solid var(--grid); border-radius: 0; padding: 5px 9px; cursor: pointer; font-family: var(--mono); }
  #bgAi .ai-refresh:hover { border-color: var(--accent); }
  #bgAi .ai-statusline { display: flex; align-items: center; gap: 7px; color: var(--muted); }
  #bgAi .ai-dot { width: 9px; height: 9px; background: #555; flex: none; }
  #bgAi .ai-dot.on { background: var(--accent); }
  #bgAi .ai-dot.err { background: #cf5a52; }
  #bgAi .ai-think { display: none; max-height: 110px; overflow: auto; background: var(--bg-2); border: 1px solid var(--grid); padding: 8px; color: var(--text); white-space: pre-wrap; font-size: 11px; line-height: 1.45; }
  #bgAi .ai-think.show { display: block; }
  #bgAi .ai-hint { font-size: 11px; color: var(--muted); line-height: 1.5; }
  #bgAi .ai-hint a { color: var(--accent); }
  #bgAi.hide-side { display: none; }

  @media (max-width: 820px) { .panel { width: min(94vw, 440px); } }
</style>

<body>
  <h1>Backgammon</h1>

          The computer uses a built-in heuristic AI by default. Tick the box to let a model on
          <em>your</em> machine choose its moves · <a href="../../ai-setup.html">connect a model ▸</a>
        </div>
      </div>
    </div>
  </div>

<script src="../../lib/byom.js"></script>
<script>
"use strict";

/* ============================================================
   Backgammon — single file.

   Points are numbered 1..24. White moves 24 → 1 and bears off
   past point 1 (home = 1..6). Black moves 1 → 24 and bears off
   past point 24 (home = 19..24). state.pts[p] is signed:
   positive = that many White checkers, negative = Black.

   The engine enumerates every legal *full turn* (respecting the
   "use both dice / play the larger die" rules). The human is only
   ever offered sub-moves that lie on a maximal legal turn, so an
   illegal or wasteful move can't be made; the built-in AI and the
   optional local model both pick from the same enumerated turns.
   ============================================================ */

const WHITE = "w", BLACK = "b";
const sgn = pl => (pl === WHITE ? 1 : -1);
const oppOf = pl => (pl === WHITE ? BLACK : WHITE);
const SHOTS = { 1:11, 2:12, 3:14, 4:15, 5:15, 6:17, 7:6, 8:6, 9:5, 10:3, 11:2, 12:3 };

function newState() {
  const pts = new Array(25).fill(0);
  pts[24] = 2; pts[13] = 5; pts[8] = 3; pts[6] = 5;       // White (+)
  pts[1] = -2; pts[12] = -5; pts[17] = -3; pts[19] = -5;  // Black (−)
  return { pts, bar: { w: 0, b: 0 }, off: { w: 0, b: 0 } };
}
function clone(s) {
  return { pts: s.pts.slice(), bar: { w: s.bar.w, b: s.bar.b }, off: { w: s.off.w, b: s.off.b } };
}
function cnt(s, p, pl) { const v = s.pts[p]; return pl === WHITE ? (v > 0 ? v : 0) : (v < 0 ? -v : 0); }

function allHome(s, pl) {
  if (s.bar[pl] > 0) return false;
  if (pl === WHITE) { for (let p = 7; p <= 24; p++) if (s.pts[p] > 0) return false; }
  else { for (let p = 1; p <= 18; p++) if (s.pts[p] < 0) return false; }
  return true;
}
function noBehind(s, pl, p) {
  // any own checkers farther from bearing off than point p?
  if (pl === WHITE) { for (let q = p + 1; q <= 6; q++) if (s.pts[q] > 0) return false; }
  else { for (let q = 19; q < p; q++) if (s.pts[q] < 0) return false; }
  return true;
}

// every legal single move using one die value d
function singleMoves(s, pl, d) {
  const opp = oppOf(pl), out = [];
  if (s.bar[pl] > 0) {
    const e = pl === WHITE ? 25 - d : d;
    if (cnt(s, e, opp) <= 1) out.push({ from: "bar", to: e, die: d, hit: cnt(s, e, opp) === 1 });
    return out;
  }
  for (let p = 1; p <= 24; p++) {
    if (cnt(s, p, pl) === 0) continue;
    const to = pl === WHITE ? p - d : p + d;
    if (to >= 1 && to <= 24) {
      if (cnt(s, to, opp) <= 1) out.push({ from: p, to, die: d, hit: cnt(s, to, opp) === 1 });
    } else {                                  // bearing-off territory
      if (!allHome(s, pl)) continue;
      const dist = pl === WHITE ? p : 25 - p;  // pips this checker needs to come off
      if (dist === d || (dist < d && noBehind(s, pl, p)))
        out.push({ from: p, to: "off", die: d, hit: false });
    }
  }
  return out;
}

function applyMove(s, pl, m) {
  const n = clone(s), opp = oppOf(pl), si = sgn(pl);
  if (m.from === "bar") n.bar[pl]--; else n.pts[m.from] -= si;
  if (m.to === "off") n.off[pl]++;
  else { if (m.hit) { n.bar[opp]++; n.pts[m.to] = 0; } n.pts[m.to] += si; }
  return n;
}

/* ---- full-turn enumeration ---- */
function enumerate(s, pl, diceList) {
  const results = [];
  (function rec(st, left, moves) {
    let extended = false; const tried = new Set();
    for (let i = 0; i < left.length; i++) {
      const d = left[i]; if (tried.has(d)) continue; tried.add(d);
      for (const m of singleMoves(st, pl, d)) {
        extended = true;
        rec(applyMove(st, pl, m), left.slice(0, i).concat(left.slice(i + 1)), moves.concat([m]));
      }
    }
    if (!extended) results.push({ moves, state: st });
  })(s, diceList.slice(), []);
  return results;
}

// kept = the maximal legal turns (enforces use-both / play-the-larger-die)
function legalTurns(s, pl, pair) {
  const isDouble = pair[0] === pair[1];
  const diceList = isDouble ? [pair[0], pair[0], pair[0], pair[0]] : pair.slice();
  const all = enumerate(s, pl, diceList);
  const maxLen = all.reduce((m, r) => Math.max(m, r.moves.length), 0);
  let kept = all.filter(r => r.moves.length === maxLen);
  if (maxLen === 1 && !isDouble) {            // can only play one die → must be the higher if possible
    const hi = Math.max(pair[0], pair[1]);
    const usingHi = kept.filter(r => r.moves[0].die === hi);
    if (usingHi.length) kept = usingHi;
  }
  return kept;   // each: {moves:[...], state}
}

const posKey = s => s.pts.join(",") + "|" + s.bar.w + "." + s.bar.b + "." + s.off.w + "." + s.off.b;

/* ---- evaluation (higher = better for `pl`) ---- */
function pip(s, pl) {
  let t = s.bar[pl] * 25;
  for (let p = 1; p <= 24; p++) { const c = cnt(s, p, pl); if (c) t += c * (pl === WHITE ? p : 25 - p); }
  return t;
}
function inHome(pl, p) { return pl === WHITE ? (p >= 1 && p <= 6) : (p >= 19 && p <= 24); }
function blotDanger(s, pl, p) {
  const opp = oppOf(pl); let best = 0;
  const consider = d => { if (d >= 1 && d <= 12) { const pr = (SHOTS[d] || 0) / 36; if (pr > best) best = pr; } };
  if (pl === WHITE) {
    for (let q = 1; q < p; q++) if (cnt(s, q, opp) > 0) consider(p - q);
    if (s.bar[opp] > 0) consider(p);
  } else {
    for (let q = p + 1; q <= 24; q++) if (cnt(s, q, opp) > 0) consider(q - p);
    if (s.bar[opp] > 0) consider(25 - p);
  }
  return best * 9;
}
function evaluate(s, pl) {
  const opp = oppOf(pl);
  let v = pip(s, opp) - pip(s, pl);              // the race
  v += (s.off[pl] - s.off[opp]) * 8;             // borne off
  v -= s.bar[pl] * 4;                            // stuck on the bar (on top of the pip cost)
  for (let p = 1; p <= 24; p++) {
    const me = cnt(s, p, pl);
    if (me >= 2) { v += 3; if (inHome(pl, p)) v += 2; }   // made points, esp. home-board blocks
    else if (me === 1) v -= blotDanger(s, pl, p);          // exposed blot
  }
  return v;
}

// unique-by-position turns, ranked best-first for `pl`
function rankedTurns(turns, pl) {
  const seen = new Map();
  for (const t of turns) {
    const k = posKey(t.state);
    if (!seen.has(k)) seen.set(k, { moves: t.moves, state: t.state, score: evaluate(t.state, pl) });
  }
  return [...seen.values()].sort((a, b) => b.score - a.score);
}

function turnNotation(moves) {
  if (!moves.length) return "(no move)";
  return moves.map(m => `${m.from === "bar" ? "bar" : m.from}/${m.to === "off" ? "off" : m.to}${m.hit ? "*" : ""}`).join(" ");
}

/* ============================================================
   Game state + UI
   ============================================================ */
let state, turn, gameOver, rolling, aiThinking, noMoves;
let pair = [0, 0], turnPlays = [], humanMoves = [], consumed = [], subStack = [];
let selected = null, lastTurnMoves = [];
let mode = "pvp", aiPlayer = BLACK, aiLevel = "med";

const boardEl = document.getElementById("board");
const diceEl = document.getElementById("dicewrap");

const rnd = n => Math.floor(Math.random() * n);
const pickFrom = arr => arr[rnd(arr.length)];
const isHumanTurn = () => !gameOver && (mode === "pvp" || turn !== aiPlayer);
const delay = ms => new Promise(r => setTimeout(r, ms));

/* ---- which sub-moves are legal right now ---- */
function sameMove(a, b) { return a.from === b.from && a.to === b.to; }
function consistentTurns() {
  return turnPlays.filter(t =>
    t.moves.length >= humanMoves.length && humanMoves.every((hm, i) => sameMove(t.moves[i], hm)));
}
function nextMoves() {
  const out = [], seen = new Set();
  for (const t of consistentTurns()) {
    if (t.moves.length <= humanMoves.length) continue;
    const m = t.moves[humanMoves.length], k = m.from + ">" + m.to;
    if (!seen.has(k)) { seen.add(k); out.push(m); }
  }
  return out;
}
function turnComplete() { return nextMoves().length === 0; }

/* ---- turn flow ---- */
function startTurn() {
  selected = null; humanMoves = []; consumed = []; subStack = []; noMoves = false;
  pair = [1 + rnd(6), 1 + rnd(6)];
  turnPlays = legalTurns(state, turn, pair);
  rolling = false;
  if (turnPlays.length && turnPlays[0].moves.length === 0) {
    noMoves = true; render();
    setTimeout(() => { if (!gameOver) { turn = oppOf(turn); startTurn(); } }, 1300);
    return;
  }
  render();
  if (!isHumanTurn()) scheduleAI();
}

function applySub(m) {
  subStack.push(clone(state));
  state = applyMove(state, turn, m);
  humanMoves.push(m); consumed.push(m.die); selected = null;
  if (turnComplete()) { render(); setTimeout(finishTurn, 220); }
  else render();
}

function finishTurn() {
  lastTurnMoves = humanMoves.slice();
  if (state.off[turn] === 15) { endGame(); return; }
  turn = oppOf(turn);
  startTurn();
}

function endGame() {
  const winner = turn, loser = oppOf(turn);
  let mult = "single";
  if (state.off[loser] === 0) {
    const back = winner === WHITE
      ? (state.bar.b > 0 || (() => { for (let p = 1; p <= 6; p++) if (state.pts[p] < 0) return true; return false; })())
      : (state.bar.w > 0 || (() => { for (let p = 19; p <= 24; p++) if (state.pts[p] > 0) return true; return false; })());
    mult = back ? "backgammon" : "gammon";
  }
  gameOver = { winner, mult };
  render();
}

/* ---- interaction ---- */
function handleClick(id) {
  if (!isHumanTurn() || gameOver || rolling || aiThinking || noMoves) return;
  const moves = nextMoves();
  if (selected === null) {
    if (moves.some(m => m.from === id)) { selected = id; render(); }
    return;
  }
  const m = moves.find(x => x.from === selected && (x.to === id || (id === "off" && x.to === "off")));
  if (m) { applySub(m); return; }
  if (moves.some(x => x.from === id)) { selected = id; render(); return; }  // re-select another source
  selected = null; render();
}

function undo() {
  if (aiThinking || rolling) return;
  if (subStack.length) {
    state = subStack.pop(); humanMoves.pop(); consumed.pop(); selected = null; render();
  }
}

/* ---- computer turn ---- */
function scheduleAI() { aiThinking = true; render(); setTimeout(runAI, 380); }
function pickTurn() {
  const r = rankedTurns(turnPlays, turn);
  if (!r.length || r[0].moves.length === 0) return null;
  if (aiLevel === "hard") return r[0];
  if (aiLevel === "med") return pickFrom(r.slice(0, Math.min(3, r.length)));
  return pickFrom(r);                              // easy
}
async function animateTurn(moves) {
  for (const m of moves) {
    state = applyMove(state, turn, m); consumed.push(m.die); render();
    await delay(420);
  }
}
async function runAI() {
  if (gameOver || isHumanTurn()) { aiThinking = false; return; }
  let chosen = null, source = "builtin";
  if (modelActive()) { try { chosen = await modelTurn(); if (chosen) source = "model"; } catch (e) { /* fall through */ } }
  if (!chosen) { chosen = pickTurn(); if (modelActive()) source = "fallback"; }
  if (!chosen) { aiThinking = false; finishTurn(); return; }
  const note = turnNotation(chosen.moves);
  await animateTurn(chosen.moves);
  aiThinking = false;
  if (source === "model") setBgStatus("Model played " + note + ".", "on");
  else if (source === "fallback") setBgStatus("Model reply unclear — built-in played " + note + ".", "err");
  else setBgStatus("Built-in AI played " + note + ".", "on");
  lastTurnMoves = chosen.moves.slice();
  if (state.off[turn] === 15) { endGame(); return; }
  turn = oppOf(turn); startTurn();
}

/* ============================================================
   Rendering
   ============================================================ */
function pipFace(n) {
  const set = { 1:[4], 2:[0,8], 3:[0,4,8], 4:[0,2,6,8], 5:[0,2,4,6,8], 6:[0,2,3,5,6,8] }[n] || [];
  let h = "";
  for (let i = 0; i < 9; i++) h += `<span class="pip">${set.includes(i) ? "<i></i>" : ""}</span>`;
  return h;
}
function renderDice() {
  diceEl.innerHTML = "";
  if (!pair[0]) return;
  const faces = pair[0] === pair[1] ? [pair[0], pair[0], pair[0], pair[0]] : [pair[0], pair[1]];
  const used = consumed.slice();
  faces.forEach(v => {
    const d = document.createElement("div"); d.className = "die"; d.innerHTML = pipFace(v);
    const k = used.indexOf(v); if (k >= 0) { d.classList.add("used"); used.splice(k, 1); }
    diceEl.appendChild(d);
  });
  if (noMoves) { const s = document.createElement("span"); s.className = "dice-hint"; s.textContent = "no legal move"; diceEl.appendChild(s); }
}

function stackEl(count, color) {
  const wrap = document.createElement("div"); wrap.className = "stack";
  const show = Math.min(count, 5);
  for (let i = 0; i < show; i++) {
    const c = document.createElement("div"); c.className = "checker " + color;
    if (i === show - 1 && count > 5) c.textContent = count;
    wrap.appendChild(c);
  }
  return wrap;
}

function pointEl(p, idxInRow) {
  const el = document.createElement("div");
  el.className = "point " + (idxInRow % 2 === 0 ? "tri-a" : "tri-b");
  el.innerHTML = '<div class="tri"></div>';
  const num = document.createElement("span"); num.className = "num"; num.textContent = p; el.appendChild(num);
  const w = cnt(state, p, WHITE), b = cnt(state, p, BLACK);
  if (w) el.appendChild(stackEl(w, "w"));
  else if (b) el.appendChild(stackEl(b, "b"));

  if (isHumanTurn() && !gameOver && !aiThinking && !rolling && !noMoves) {
    const moves = nextMoves();
    if (selected === p) el.classList.add("sel");
    if (selected === null && moves.some(m => m.from === p)) el.classList.add("src");
    if (selected !== null && moves.some(m => m.from === selected && m.to === p)) el.classList.add("dst");
  }
  el.addEventListener("click", () => handleClick(p));
  return el;
}

function barEl(half) {
  const el = document.createElement("div"); el.className = "bar";
  const color = half === "top" ? "b" : "w";          // black sits top, white bottom
  const c = half === "top" ? state.bar.b : state.bar.w;
  for (let i = 0; i < Math.min(c, 4); i++) {
    const ch = document.createElement("div"); ch.className = "checker " + color;
    if (i === Math.min(c, 4) - 1 && c > 4) ch.textContent = c;
    el.appendChild(ch);
  }
  const mine = (half === "bottom" && turn === WHITE) || (half === "top" && turn === BLACK);
  if (isHumanTurn() && !gameOver && !aiThinking && !rolling && !noMoves && mine) {
    const moves = nextMoves();
    if (selected === "bar") el.classList.add("sel");
    else if (moves.some(m => m.from === "bar")) el.classList.add("src");
  }
  el.addEventListener("click", () => handleClick("bar"));
  return el;
}

function render() {
  // dice
  renderDice();
  // board: top row points 13..18 | bar | 19..24 ; bottom 12..7 | bar | 6..1
  boardEl.innerHTML = "";
  const top = document.createElement("div"); top.className = "half top";
  const bot = document.createElement("div"); bot.className = "half bottom";

  const tL = document.createElement("div"); tL.className = "quad";
  [13,14,15,16,17,18].forEach((p, i) => tL.appendChild(pointEl(p, i)));
  const tR = document.createElement("div"); tR.className = "quad";
  [19,20,21,22,23,24].forEach((p, i) => tR.appendChild(pointEl(p, i + 1)));
  top.append(tL, barEl("top"), tR);

  const bL = document.createElement("div"); bL.className = "quad";
  [12,11,10,9,8,7].forEach((p, i) => bL.appendChild(pointEl(p, i)));
  const bR = document.createElement("div"); bR.className = "quad";
  [6,5,4,3,2,1].forEach((p, i) => bR.appendChild(pointEl(p, i + 1)));
  bot.append(bL, barEl("bottom"), bR);

  boardEl.append(top, bot);

  // bear-off trays
  document.getElementById("offWcount").textContent = state.off.w;
  document.getElementById("offBcount").textContent = state.off.b;
  const offW = document.getElementById("offW"), offB = document.getElementById("offB");
  offW.classList.remove("dst"); offB.classList.remove("dst");
  if (isHumanTurn() && selected !== null && !gameOver && !aiThinking && !rolling && !noMoves) {
    const canOff = nextMoves().some(m => m.from === selected && m.to === "off");
    if (canOff) (turn === WHITE ? offW : offB).classList.add("dst");
  }
  offW.onclick = () => handleClick("off");
  offB.onclick = () => handleClick("off");

  updatePanel();
}

function updatePanel() {
  const sw = document.getElementById("turnSwatch");
  sw.className = "swatch " + turn;
  const name = pl => (mode === "ai" && pl === aiPlayer) ? "Computer (" + (pl === WHITE ? "White" : "Black") + ")" : (pl === WHITE ? "White" : "Black");
  document.getElementById("turnText").textContent = gameOver ? "Game over" : name(turn) + " to play";

  document.getElementById("pipW").textContent = pip(state, WHITE);
  document.getElementById("pipB").textContent = pip(state, BLACK);

  const st = document.getElementById("status"); st.className = "status";
  if (gameOver) {
    st.classList.add("over");
    const w = gameOver.winner === WHITE ? "White" : "Black";
    const tail = gameOver.mult === "backgammon" ? " — backgammon! (×3)" : gameOver.mult === "gammon" ? " — gammon! (×2)" : "";
    st.textContent = (mode === "ai" && gameOver.winner === aiPlayer ? "Computer (" + w + ") wins" : w + " wins") + tail + "!";
  } else if (aiThinking) {
    st.textContent = "Computer is thinking…";
  } else if (noMoves) {
    st.textContent = name(turn) + " can't move — passing.";
  } else if (state.bar[turn] > 0 && isHumanTurn()) {
    st.textContent = "On the bar — enter first.";
  } else if (isHumanTurn()) {
    st.textContent = selected !== null ? "Choose where to land." : "Pick a checker to move.";
  } else {
    st.textContent = "";
  }
  document.getElementById("undoBtn").disabled = subStack.length === 0 || aiThinking || rolling;
}

/* ============================================================
   New game / mode wiring
   ============================================================ */
function newGame() {
  state = newState(); turn = WHITE; gameOver = null; aiThinking = false; rolling = false;
  selected = null; lastTurnMoves = [];
  if (bgController) { try { bgController.abort(); } catch (e) {} bgController = null; }
  bgThink.classList.remove("show"); bgThink.textContent = "";
  startTurn();
}

document.getElementById("modeSeg").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  mode = b.dataset.mode;
  [...e.currentTarget.children].forEach(x => x.classList.toggle("active", x === b));
  const ai = mode === "ai";
  document.getElementById("diffField").style.display = ai ? "" : "none";
  document.getElementById("aiColorField").style.display = ai ? "" : "none";
  bgAiPanel.classList.toggle("hide-side", !ai);
  newGame();
});
document.getElementById("diffSeg").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  aiLevel = b.dataset.d;
  [...e.currentTarget.children].forEach(x => x.classList.toggle("active", x === b));
});
document.getElementById("aiColorSeg").addEventListener("click", e => {
  const b = e.target.closest("button"); if (!b) return;
  aiPlayer = b.dataset.c;
  [...e.currentTarget.children].forEach(x => x.classList.toggle("active", x === b));
  newGame();
});
document.getElementById("newBtn").addEventListener("click", newGame);
document.getElementById("undoBtn").addEventListener("click", undo);

/* ============================================================
   Local model (shared BYOM)
   ============================================================ */
const bgUseModel = document.getElementById("bgUseModel");
const bgModelSel = document.getElementById("bgModelSel");
const bgEndpoint = document.getElementById("bgEndpoint");
const bgThink = document.getElementById("bgThink");
const bgStatusEl = document.getElementById("bgStatus");
const bgDot = document.getElementById("bgDot");
const bgAiPanel = document.getElementById("bgAi");
let bgController = null;

function modelActive() {
  return mode === "ai" && typeof XenoBYOM !== "undefined" && XenoBYOM.isLocal() &&
    bgUseModel.checked && bgModelSel.value && !bgModelSel.disabled;
}
function endpointBase() { return (bgEndpoint.value || "http://localhost:11434").replace(/\/$/, ""); }
function setBgStatus(t, s) { bgStatusEl.textContent = t; bgDot.className = "ai-dot" + (s ? " " + s : ""); }

function asciiBoard(pl) {
  const list = c => { const a = []; for (let p = 1; p <= 24; p++) { const n = cnt(state, p, c); if (n) a.push(p + "×" + n); } return a.join(", ") || "none"; };
  return [
    `White (moves 24→1, off past 1): ${list(WHITE)}` + (state.bar.w ? `, BAR×${state.bar.w}` : "") + (state.off.w ? `, off×${state.off.w}` : ""),
    `Black (moves 1→24, off past 24): ${list(BLACK)}` + (state.bar.b ? `, BAR×${state.bar.b}` : "") + (state.off.b ? `, off×${state.off.b}` : ""),
    `Dice: ${pair[0]} and ${pair[1]}${pair[0] === pair[1] ? " (doubles → four moves)" : ""}`,
    `You are ${pl === WHITE ? "White" : "Black"}.`,
  ].join("\n");
}
async function modelTurn() {
  const ranked = rankedTurns(turnPlays, turn);
  if (!ranked.length || ranked[0].moves.length === 0) return null;
  const top = ranked.slice(0, 30);
  const me = turn === WHITE ? "White" : "Black";
  const list = top.map((t, i) => `${i + 1}. ${turnNotation(t.moves)}`).join("\n");
  const system =
`You are a strong backgammon engine playing ${me}. Notation is from/to; "bar/20" enters from the bar, "6/off" bears a checker off, a trailing * means you hit a blot. A full turn uses both dice (or all four on doubles).
You will get the board and a NUMBERED list of every legal full turn. Pick exactly one by its number. Prefer hitting blots, making points, and racing home safely without leaving exposed blots. Reply with at most one short sentence, then a final line exactly:
MOVE: <number>`;
  const user = `${asciiBoard(turn)}\n\nLegal full turns:\n${list}\n\nPick the best turn and give your MOVE: line.`;
  bgThink.classList.add("show"); bgThink.textContent = "";
  bgController = new AbortController();
  const killer = setTimeout(() => { try { bgController.abort(); } catch (e) {} }, 45000);
  let reply = "";
  try {
    reply = await XenoBYOM.chat({
      endpoint: endpointBase(), model: bgModelSel.value,
      messages: [{ role: "system", content: system }, { role: "user", content: user }],
      temperature: 0.4, maxTokens: 700,
      onToken: d => { bgThink.textContent += d; bgThink.scrollTop = bgThink.scrollHeight; },
      onThinking: d => { bgThink.textContent += d; bgThink.scrollTop = bgThink.scrollHeight; },
      signal: bgController.signal,
    });
  } finally { clearTimeout(killer); bgController = null; }
  const mi = reply.match(/MOVE:\s*(\d{1,3})/i);
  if (mi) { const k = +mi[1] - 1; if (k >= 0 && k < top.length) return top[k]; }
  const num = reply.match(/\b(\d{1,3})\b/);
  if (num) { const k = +num[1] - 1; if (k >= 0 && k < top.length) return top[k]; }
  return null;
}

async function loadModels() {
  if (typeof XenoBYOM === "undefined" || !XenoBYOM.isLocal()) return;
  XenoBYOM.saveConfig({ endpoint: endpointBase() });
  bgModelSel.disabled = true; bgModelSel.innerHTML = "<option>loading…</option>";
  const saved = XenoBYOM.loadConfig().model;
  const res = await XenoBYOM.test({ endpoint: endpointBase() });
  if (!res.ok) {
    bgModelSel.innerHTML = '<option value="">— not reachable —</option>';
    setBgStatus(res.error.message + " — built-in AI will play instead.", "err");
    return;
  }
  bgModelSel.innerHTML = res.models.map(n => `<option value="${n}">${n}</option>`).join("");
  bgModelSel.disabled = false;
  const fav = res.models.indexOf(saved) >= 0 ? saved
    : (res.models.find(n => /llama3\.2:3b|qwen2\.5|3b|7b|8b|mini|small/i.test(n)) || res.models[0]);
  bgModelSel.value = fav; XenoBYOM.saveConfig({ model: fav });
  setBgStatus("Model ready — " + res.models.length + " via " + res.provider + ".", "on");
}

bgModelSel.addEventListener("change", () => XenoBYOM.saveConfig({ model: bgModelSel.value }));
document.getElementById("bgRefresh").addEventListener("click", loadModels);
bgEndpoint.addEventListener("change", loadModels);

/* ---- boot ---- */
bgAiPanel.classList.add("hide-side");
newGame();
if (typeof XenoBYOM !== "undefined" && XenoBYOM.isLocal()) {
  bgEndpoint.value = XenoBYOM.loadConfig().endpoint || "http://localhost:11434";
  loadModels();
}
</script>
